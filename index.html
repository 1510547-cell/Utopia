<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Games</title>

  <!-- Favicon -->
  icons/games.ico

  <!-- Styles -->
  style.css
</head>

<body>
  <div class="container">

    <aside class="sidebar">
      <h1>🎮 Games</h1>
      <button onclick="toggleSettings()">⚙ Settings</button>
    </aside>

    <main class="content">
      <h2>Game Library</h2>

      <!-- ✅ SEARCH BAR (VERY OBVIOUS VERSION) -->
      <input
        type="text"
        id="searchBar"
        placeholder="🔍 SEARCH — TYPE HERE"
        onkeyup="searchGames()"
        style="
          width: 300px;
          padding: 10px;
          margin-bottom: 20px;
          font-size: 16px;
        "
      >

      <div class="grid">
        <div class="card"><h3>Cookie Clicker</h3></div>
        <div class="card"><h3>Slope</h3></div>
        <div class="card"><h3>2048</h3></div>
      </div>
    </main>

  </div>

  script.js</script>
</body>
</html>
